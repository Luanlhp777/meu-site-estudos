<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programação Web 1</title>
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/pages.css">
    <link rel="stylesheet" href="../../css/responsive.css">
</head>

<body data-root="../../">

    <header class="hero hero-secundario">
        <div class="hero-inner">
            <span class="hero-kicker">Disciplina</span>
            <h1>Programação Web 1</h1>
            <p class="hero-lead">Fundamentos de front-end, semântica e estilo para construir páginas eficientes.</p>
            <div class="hero-meta">
                <span class="hero-pill">HTML</span>
                <span class="hero-pill">CSS</span>
                <span class="hero-pill">Boas Práticas</span>
            </div>
        </div>
    </header>

    <div class="area-voltar">
        <a href="modulo1.html" class="btn-voltar">← Voltar</a>
    </div>

    <main class="conteudo-interno">

        <section id="lista-aulas"></section>

    </main>

    <!-- Modal para exibir a imagem em tamanho grande -->
    <div id="imagemModal" class="modal" onclick="fecharModal()">
        <span class="fechar" onclick="fecharModal()">×</span>
        <img id="imagemGrande" class="imagem-grande" src="" alt="Imagem Grande">
    </div>

    <script src="../../js/aulas/web.js"></script>
    <script src="../../js/render-aulas.js"></script>

    <script>
        renderizarAulas(aulasWeb, "lista-aulas");
        // Função para abrir o modal
        function abrirModal(imagemSrc) {
            const modal = document.getElementById("imagemModal");
            const imagem = document.getElementById("imagemGrande");
            imagem.src = imagemSrc;
            modal.style.display = "block";
        }

        // Função para fechar o modal
        function fecharModal() {
            const modal = document.getElementById("imagemModal");
            modal.style.display = "none";
        }
    </script>

    <script src="../../js/layout.js"></script>

</body>

</html>
